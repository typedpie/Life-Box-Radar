name: Motor Espia Licitaciones

# Cuándo debe ejecutarse
on:
  schedule:
    - cron: '*/30 * * * *' # Se ejecuta cada 30 minutos
  workflow_dispatch: # Crea un botón en GitHub para ejecutarlo manualmente cuando quieras

jobs:
  ejecutar-bot:
    runs-on: ubuntu-latest # Computador Linux de GitHub

    steps:
    - name: Clonar el código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar librerías del bot
      # Instalamos todo lo que usa tu main.py directamente
      run: |
        pip install selenium groq pandas google-cloud-bigquery webdriver-manager openpyxl pandas-gbq

    - name: Crear llave maestra de Google
      # Inyecta tu llave de Google Cloud desde los secretos antes de correr
      run: |
        echo '${{ secrets.GCP_CREDENTIALS }}' > credenciales_gcp.json

    - name: Ejecutar el Espía
      # Pone la llave de Groq en la memoria y lanza tu main.py
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        python main.py