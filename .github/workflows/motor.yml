name: Motor Espia Licitaciones

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  ejecutar-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el codigo
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar librerias
      run: |
        pip install selenium groq pandas google-cloud-bigquery webdriver-manager openpyxl pandas-gbq

    - name: Crear llave maestra de Google
      run: |
        echo '${{ secrets.GCP_CREDENTIALS }}' > credenciales_gcp.json

    - name: Ejecutar el Espia
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        python main.py